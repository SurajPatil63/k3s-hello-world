apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-world-html
  namespace: hello-world
  labels:
    app: hello-world-nginx
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <title>Hello World</title>
      <style>
        body {
          font-family: Arial, sans-serif;
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          margin: 0;
          background: #1e1e2f;
          color: #fff;
        }
        h1 {
          font-size: 3rem;
        }
      </style>
    </head>
    <body>
      <h1>Hello World from k3s!</h1>
    </body>
    </html>
